<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <title>SDL web game</title>

    <meta name="title" content="SDL web game">
    <meta name="description" content="Web game created with sDL">
    <meta name="keywords" content="games, html5, programming, C, C++, library, videogames">
    <meta name="viewport" content="width=device-width">

    <!-- Favicon -->
    <link rel="shortcut icon" href="https://www.libsdl.org/favicon.ico">

    <style>
        body {
            margin: 0px;
            text-align: center;
            background-color: black;
        }
        canvas.emscripten { border: 0px none; background-color: black; display: block; }

        #game-container {
            position: relative;
            display: inline-block;
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: black;
            color: white;
            font-family: monospace;
            font-size: 16px;
            z-index: 10;
        }
        #loading-overlay.hidden { display: none; }

        #progress-bar-container {
            width: 60%;
            height: 16px;
            background: #333;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 12px;
        }
        @keyframes shimmer {
            0%   { background-position: -200% center; }
            100% { background-position:  200% center; }
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: #4af;
            border-radius: 8px;
            transition: width 0.3s ease;
        }
        #progress-bar.compiling {
            background: linear-gradient(90deg, #4af 30%, #8df 50%, #4af 70%);
            background-size: 200% 100%;
            animation: shimmer 1.2s linear infinite;
        }
        #progress-label {
            margin-top: 8px;
            color: #aaa;
            font-size: 13px;
        }
    </style>
    </head>
    <body>
        <div id="game-container">
            <div id="loading-overlay">
                <div id="loading-status">Loading...</div>
                <div id="progress-bar-container">
                    <div id="progress-bar"></div>
                </div>
                <div id="progress-label">0%</div>
            </div>
            <canvas class=emscripten id=canvas oncontextmenu=event.preventDefault() tabindex=-1></canvas>
        </div>
        <script>
            function hideLoadingOverlay() {
                var bar = document.getElementById('progress-bar');
                bar.classList.remove('compiling');
                bar.style.width = '100%';
                document.getElementById('progress-label').textContent = '100%';
                document.getElementById('loading-status').textContent = 'Starting...';
                // Small delay so the user sees 100% before the overlay disappears.
                setTimeout(function() {
                    var overlay = document.getElementById('loading-overlay');
                    if (overlay) overlay.classList.add('hidden');
                }, 500);
            }

            var Module = {
                // postRun fires after main() returns (i.e. after SDL_AppInit runs).
                postRun: [hideLoadingOverlay],
                setStatus: function(text) {
                    var match = text.match(/(\d+(\.\d+)?)\/(\d+)/);
                    if (match) {
                        var loaded = parseInt(match[1]);
                        var total  = parseInt(match[3]);
                        // Cap at 90% — the remaining 10% is WASM compilation + SDL init,
                        // which completes when postRun fires and sets the bar to 100%.
                        var pct = total > 0 ? Math.min(90, Math.round((loaded / total) * 90)) : 0;
                        document.getElementById('progress-bar').style.width = pct + '%';
                        document.getElementById('progress-label').textContent = pct + '%';
                    } else if (text.length > 0) {
                        // Non-progress status text signals the compilation phase.
                        document.getElementById('loading-status').textContent = 'Compiling...';
                        var bar = document.getElementById('progress-bar');
                        bar.style.width = '90%';
                        bar.classList.add('compiling');
                        document.getElementById('progress-label').textContent = '90%';
                    }
                }
            };
        </script>
        {{{ SCRIPT }}}
    </body>
</html>
